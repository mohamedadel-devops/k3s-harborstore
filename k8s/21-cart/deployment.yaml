apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: harborstore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      initContainers:
        - name: wait-for-redis
          image: redis:7
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for Redis..."
              until redis-cli -h redis -p 6379 ping | grep -q PONG; do
                sleep 2
              done
              echo "Redis is reachable."
      containers:
        - name: cart
          image: hashicorp/http-echo:1.0
          args:
            - "-listen=:8081"
            - "-text=Cart service is up. Redis connectivity check passed."
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
