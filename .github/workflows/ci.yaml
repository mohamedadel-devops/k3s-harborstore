name: CI - Validate Kubernetes Manifests

on:
  pull_request:
    branches: ["main"]

  push:
    branches-ignore: ["main"]

jobs:
  validate:
    name: Validate Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Keep your existing validation steps below...name: CI - Validate Kubernetes Manifests

      - name: Validate YAML syntax (Python)
        run: |
          python - <<'PY'
          import os, sys
          import yaml

          root_dir = "k8s"
          for root, _, files in os.walk(root_dir):
              for f in files:
                  if f.endswith((".yml", ".yaml")):
                      path = os.path.join(root, f)
                      with open(path, "r", encoding="utf-8") as fp:
                          try:
                              list(yaml.safe_load_all(fp))
                          except Exception as e:
                              print(f"YAML error in {path}: {e}")
                              sys.exit(1)

          print("✅ All YAML files parsed successfully.")
          PY
